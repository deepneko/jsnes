<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>jsnes</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
      body {
        margin: 0;
        padding: 0;
        height: 100vh;
        width: 100vw;
        font-family: 'Press Start 2P', cursive;
        background-color: #f0f0f0; /* Famicom White body */
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        overflow: hidden;
      }
      
      /* Top and Bottom Red Bands (like the console sides/front) */
      body::before, body::after {
        content: "";
        position: absolute;
        left: 0;
        width: 100%;
        height: 40px;
        background-color: #8b0000;
        border-bottom: 4px solid #000;
        z-index: -1;
      }
      body::before { top: 0; }
      body::after { 
        bottom: 0; 
        border-bottom: none;
        border-top: 4px solid #000;
      }

      #container {
        display: flex;
        align-items: flex-start;
        gap: 30px;
        justify-content: center;
        padding: 40px;
        background: #f0f0f0;
        border: 4px solid #000; /* Main casing border */
        box-shadow: 10px 10px 0px rgba(0,0,0,0.5);
        position: relative;
      }

      /* Decorative "Vents" */
      #container::before {
        content: "FAMILY COMPUTER";
        position: absolute;
        top: -25px;
        right: 20px;
        color: #8b0000;
        font-size: 16px;
        background: #f0f0f0;
        padding: 0 10px;
        font-weight: bold;
      }

      #sidebar {
        width: 280px;
        display: flex;
        flex-direction: column;
        max-height: 520px;
        border: 4px solid #000;
        background-color: #202020; /* Controller black/gold area */
        padding: 15px;
      }
      
      /* Gold Plate effect for Sidebar */
      #sidebar-header {
        background-color: #d4af37; /* Gold */
        color: #000;
        padding: 10px;
        text-align: center;
        margin-bottom: 15px;
        border: 2px solid #000;
        font-size: 12px;
        box-shadow: inset 2px 2px 0px rgba(255,255,255,0.5);
      }

      #open-folder {
        width: 100%;
        padding: 15px;
        font-family: 'Press Start 2P', cursive;
        font-size: 10px;
        background-color: #8b0000; /* Button Red */
        color: #fff; 
        border: 4px solid #d4af37; /* Gold rim */
        cursor: pointer;
        text-transform: uppercase;
        margin-bottom: 10px;
        box-shadow: 2px 2px 0px #000;
      }
      #open-folder:hover {
        background-color: #a00000;
        transform: translate(1px, 1px);
        box-shadow: 1px 1px 0px #000;
      }
      #open-folder:active {
        transform: translate(2px, 2px);
        box-shadow: none;
      }

      #rom-list {
        flex-grow: 1;
        overflow-y: auto;
        border: 2px solid #404040;
        padding: 5px;
        display: none;
        background: #000;
        /* Custom scrollbar */
        scrollbar-width: thin;
        scrollbar-color: #8b0000 #000;
      }
      #rom-list button {
        width: 100%;
        text-align: left;
        padding: 10px;
        margin-bottom: 5px;
        font-family: 'Press Start 2P', cursive;
        font-size: 10px;
        cursor: pointer;
        border: 1px solid #404040;
        background: #202020;
        color: #ccc;
        text-overflow: ellipsis;
        overflow: hidden;
        white-space: nowrap;
        text-transform: uppercase;
      }
      #rom-list button:hover {
        background: #8b0000;
        color: #fff;
        border-color: #d4af37;
      }

      canvas#console {
        width: 512px;
        height: 480px;
        image-rendering: pixelated; 
        border: 20px solid #202020; /* TV Frame styling */
        border-radius: 10px;
        display: block;
        background: #000;
        box-shadow: inset 0 0 20px rgba(255,255,255,0.1);
      }
    </style>
    <script type="module" src="./main.js"></script>
  </head>

  <body id="body">
    <div id="container">
      <div id="sidebar">
        <div id="sidebar-header">PLAYER I</div>
        <input type="button" value="Load ROM Folder" id="open-folder" style="width: 100%; padding: 8px;">
        <div id="rom-list"></div>
      </div>
      <div>
        <canvas id="console" width="256" height="240" tabindex="0"></canvas>
      </div>
    </div>
  </body>
</html>
